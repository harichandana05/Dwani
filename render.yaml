services:
  - type: web
    name: dwani-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://dwani.vercel.app
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in the Render dashboard
    disk:
      name: dwani-db
      mountPath: /opt/render/project/src
      sizeGB: 1
